{% extends 'core/base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 50px auto; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #333;">ĐĂNG KÝ TÀI KHOẢN</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Đăng Ký Ngay</button>
    </form>
    <p style="text-align: center; margin-top: 10px;">Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập</a></p>
</div>
{% endblock %}
