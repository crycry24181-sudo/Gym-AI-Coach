<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym AI Coach</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #chat-box {
            height: 450px;
            overflow-y: auto;
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
        }
        .user-msg { background-color: #0d6efd; color: white; padding: 10px; border-radius: 15px 15px 0 15px; display: inline-block; max-width: 80%; float: right; margin-bottom: 10px; clear: both;}
        .ai-msg { background-color: #e9ecef; color: black; padding: 10px; border-radius: 15px 15px 15px 0; display: inline-block; max-width: 80%; float: left; margin-bottom: 10px; clear: both;}
    </style>
</head>
<body class="bg-dark">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h5 class="mb-0">🤖 Trợ lý ảo Gym AI Coach</h5>
                </div>
                <div class="card-body">
                    <div id="chat-box" class="mb-3 border">
                        <div class="ai-msg">Xin chào! Tôi là AI Coach. Tôi có thể giúp gì cho mục tiêu tập luyện và dinh dưỡng của bạn hôm nay?</div>
                    </div>

                    <div class="input-group">
                        <input type="text" id="user-input" class="form-control" placeholder="Nhập câu hỏi (VD: Tư vấn Whey tăng cơ...)">
                        <button class="btn btn-primary" onclick="sendMessage()">Gửi đi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Cho phép ấn Enter để gửi tin nhắn
    document.getElementById("user-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });

    function sendMessage() {
        let inputField = document.getElementById('user-input');
        let message = inputField.value.trim();
        if(!message) return;

        // 1. In tin nhắn của người dùng ra màn hình
        appendMessage(message, 'user-msg');
        inputField.value = '';

        // 2. Hiện trạng thái AI đang gõ chữ (Loading)
        let chatBox = document.getElementById('chat-box');
        let loadingId = "loading-" + Date.now();
        chatBox.innerHTML += `<div id="${loadingId}" class="ai-msg text-muted"><em>AI đang suy nghĩ...</em></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        // 3. Gửi dữ liệu về view của Django (view gym_ai_chat ở bước trước)
        fetch('/store/chat/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': '{{ csrf_token }}' // Bảo mật chống hack CSRF của Django
            },
            body: 'message=' + encodeURIComponent(message)
        })
        .then(response => response.json())
        .then(data => {
            // Xóa dòng chữ "AI đang suy nghĩ..."
            document.getElementById(loadingId).remove();

            // In câu trả lời của AI ra màn hình
            if(data.answer) {
                appendMessage(data.answer, 'ai-msg');
            } else {
                appendMessage("Lỗi: " + data.error, 'ai-msg text-danger');
            }
        })
        .catch(error => {
            document.getElementById(loadingId).remove();
            appendMessage("Lỗi kết nối đến máy chủ!", 'ai-msg text-danger');
        });
    }

    function appendMessage(text, className) {
        let chatBox = document.getElementById('chat-box');
        // Thay thế ký tự xuống dòng bằng thẻ <br> để HTML hiểu
        let formattedText = text.replace(/\n/g, "<br>");
        chatBox.innerHTML += `<div class="${className}">${formattedText}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight; // Tự động cuộn xuống cuối
    }
</script>

</body>
</html>
