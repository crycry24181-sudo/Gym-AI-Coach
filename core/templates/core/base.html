{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym AI Coach</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar-brand { font-weight: 900; letter-spacing: 1px; }
        .nav-link { color: rgba(255,255,255,.8)!important; }
        .nav-link:hover { color: #ffc107!important; }
        footer { margin-top: auto; }

        /* ===== AI CHAT BUTTON ===== */
        #ai-chat-toggle {
          position: fixed;
          bottom: 20px;
          right: 20px;
          background: #0d6efd;
          color: #fff;
          width: 56px;
          height: 56px;
          border-radius: 50%;
          font-size: 26px;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          box-shadow: 0 4px 12px rgba(0,0,0,.3);
          z-index: 9999;
        }

        /* ===== CHATBOX ===== */
        #ai-chatbox {
          position: fixed;
          bottom: 90px;
          right: 20px;
          width: 320px;
          background: #fff;
          border-radius: 12px;
          box-shadow: 0 8px 24px rgba(0,0,0,.25);
          display: flex;
          flex-direction: column;
          z-index: 9999;
        }

        #ai-chatbox.hidden { display: none; }

        .ai-header {
          background: #0d6efd;
          color: #fff;
          padding: 10px;
          border-radius: 12px 12px 0 0;
          display: flex;
          justify-content: space-between;
        }

        #ai-messages {
          padding: 10px;
          height: 260px;
          overflow-y: auto;
          background: #f8f9fa;
        }

        .msg {
          margin-bottom: 8px;
          padding: 8px 10px;
          border-radius: 8px;
          max-width: 80%;
          font-size: 14px;
        }

        .msg.user { background: #d1e7ff; align-self: flex-end; }
        .msg.ai { background: #e9ecef; align-self: flex-start; }

        .ai-input { display: flex; border-top: 1px solid #ddd; }
        .ai-input input { flex: 1; border: none; padding: 10px; outline: none; }
        .ai-input button {
          border: none;
          background: #0d6efd;
          color: #fff;
          padding: 0 16px;
          cursor: pointer;
        }
    </style>

    {% block css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
  <div class="container">
    <a class="navbar-brand" href="{% url 'index' %}">
      GYM AI COACH <i class="fas fa-dumbbell text-warning"></i>
    </a>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="bg-dark text-white text-center py-3">
  © 2026 Gym AI Coach
</footer>

<!-- 🤖 AI CHAT BUTTON -->
<div id="ai-chat-toggle">🤖</div>

<!-- 🤖 AI CHATBOX -->
<div id="ai-chatbox" class="hidden">
  <div class="ai-header">
    <span>AI Coach</span>
    <button id="ai-close">✖</button>
  </div>

  <div id="ai-messages"></div>

  <div class="ai-input">
    <input id="ai-text" type="text" placeholder="Hỏi AI Coach..." />
    <button id="ai-send">Gửi</button>
  </div>
</div>

<script>
const toggleBtn = document.getElementById("ai-chat-toggle");
const chatbox = document.getElementById("ai-chatbox");
const closeBtn = document.getElementById("ai-close");
const sendBtn = document.getElementById("ai-send");
const input = document.getElementById("ai-text");
const messages = document.getElementById("ai-messages");

toggleBtn.onclick = () => chatbox.classList.toggle("hidden");
closeBtn.onclick = () => chatbox.classList.add("hidden");

sendBtn.onclick = sendMessage;
input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

function addMessage(text, who) {
  const div = document.createElement("div");
  div.className = "msg " + who;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  try {
    const res = await fetch("/api/ai/chat/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    addMessage(data.reply || "AI chưa phản hồi.", "ai");
  } catch {
    addMessage("❌ Lỗi kết nối AI", "ai");
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const chatToggle = document.getElementById("ai-chat-toggle");
const chatBox = document.getElementById("ai-chatbox");
const chatClose = document.getElementById("ai-close");
const chatSend = document.getElementById("ai-send");
const chatInput = document.getElementById("ai-text");
const chatMessages = document.getElementById("ai-messages");

chatToggle.onclick = () => chatBox.classList.remove("hidden");
chatClose.onclick = () => chatBox.classList.add("hidden");

chatSend.onclick = sendMessage;
chatInput.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function sendMessage() {
  const message = chatInput.value.trim();
  if (!message) return;

  addMessage(message, "user");
  chatInput.value = "";

  fetch("/api/ai/chat/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  })
  .then(res => res.json())
  .then(data => {
    addMessage(data.reply, "ai");
  })
  .catch(() => {
    addMessage("❌ Lỗi kết nối AI", "ai");
  });
}
</script>

</body>
</html>
