{% extends 'core/admin_base.html' %}

{% block admin_content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center mb-4">
        <a href="{% url 'store:manage_vouchers' %}" class="btn btn-outline-secondary me-3 rounded-circle">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h2 class="fw-bold m-0">{{ title }}</h2>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Mã Voucher</label>
                        {{ form.code }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Loại giảm giá</label>
                        {{ form.discount_type }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Giá trị giảm</label>
                        {{ form.value }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Đơn tối thiểu (VNĐ)</label>
                        {{ form.min_purchase }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Ngày bắt đầu</label>
                        {{ form.valid_from }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Ngày hết hạn</label>
                        {{ form.valid_to }}
                    </div>
                    <div class="col-12 mb-3">
                        <div class="form-check form-switch p-3 bg-light rounded border">
                            {{ form.active }}
                            <label class="form-check-label ms-2 fw-bold" for="id_active">Kích hoạt mã này ngay lập tức</label>
                        </div>
                    </div>
                </div>
                <hr>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold rounded-pill">LƯU THAY ĐỔI</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const typeSelect = document.getElementById('id_discount_type');
    const valueInput = document.getElementById('id_value');

    // Hàm kiểm tra và giới hạn giá trị
    function enforceValueLimit() {
        if (typeSelect.value === 'PERCENTAGE') {
            valueInput.max = 100;
            valueInput.placeholder = "Tối đa 100 (%)";

            // Nếu khách đang nhập sẵn số > 100 mà chuyển sang Phần trăm thì ép về 100
            if (parseFloat(valueInput.value) > 100) {
                valueInput.value = 100;
            }
        } else {
            valueInput.removeAttribute('max');
            valueInput.placeholder = "Nhập số tiền (VNĐ)";
        }
    }

    // 1. Chạy hàm ngay khi load trang (để xử lý lúc bấm Sửa mã cũ)
    if (typeSelect && valueInput) {
        enforceValueLimit();

        // 2. Lắng nghe mỗi khi ông đổi loại giảm giá
        typeSelect.addEventListener('change', enforceValueLimit);

        // 3. Lắng nghe lúc ông đang gõ phím, lố 100 là chặt ngay!
        valueInput.addEventListener('input', function() {
            if (typeSelect.value === 'PERCENTAGE' && parseFloat(this.value) > 100) {
                this.value = 100; // Ép về 100 ngay lập tức
            }
        });
    }
});
</script>
{% endblock %}
